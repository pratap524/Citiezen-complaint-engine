<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citizen Intelligence Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="/styles.css" rel="preload" as="style" />
    <link href="/login.css" rel="preload" as="style" />
    <link href="/signup.css" rel="preload" as="style" />
    <link href="/analytics.css" rel="preload" as="style" />
    <link href="/complaints.css" rel="preload" as="style" />
    <link href="/insights.css" rel="preload" as="style" />
    <link href="/settings.css" rel="preload" as="style" />
    <link href="/submit.css" rel="preload" as="style" />
    <link href="/track.css" rel="preload" as="style" />
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 80% 10%, rgba(155, 88, 255, 0.28), transparent 34%),
          radial-gradient(circle at 16% 78%, rgba(66, 124, 255, 0.24), transparent 40%),
          linear-gradient(130deg, #040a1e 18%, #050c21 52%, #050913 100%);
        transition: opacity 220ms ease, visibility 220ms ease;
      }

      .loader-inner {
        display: grid;
        justify-items: center;
        gap: 0.75rem;
        font-family: "Outfit", "Segoe UI", sans-serif;
        color: #eaf1ff;
      }

      .loader-mark {
        width: 2.6rem;
        height: 2.6rem;
        border-radius: 0.75rem;
        display: grid;
        place-items: center;
        font-size: 0.86rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(145deg, #4b68ff, #cc64ff);
      }

      .loader-text {
        font-size: 0.98rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }

      .loader-spinner {
        width: 1.6rem;
        height: 1.6rem;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.22);
        border-top-color: #8e78ff;
        animation: loader-spin 0.8s linear infinite;
      }

      @keyframes loader-spin {
        to {
          transform: rotate(360deg);
        }
      }

      html[data-route-style-ready="true"] #app-loader {
        opacity: 0;
        visibility: hidden;
      }
    </style>
    <script>
      (function () {
        var path = window.location.pathname.toLowerCase();
        var href = '/styles.css';

        if (path.startsWith('/login')) href = '/login.css';
        else if (path.startsWith('/signup')) href = '/signup.css';
        else if (path.startsWith('/submit')) href = '/submit.css';
        else if (path.startsWith('/track')) href = '/track.css';
        else if (path.startsWith('/analytics')) href = '/analytics.css';
        else if (path.startsWith('/complaints')) href = '/complaints.css';
        else if (path.startsWith('/insights')) href = '/insights.css';
        else if (path.startsWith('/settings')) href = '/settings.css';

        var styleId = 'page-style-' + href.replace(/[^a-z0-9]/gi, '-');
        if (document.getElementById(styleId)) return;

        var preloaded = document.querySelector('link[rel="preload"][as="style"][href="' + href + '"]');
        var link = preloaded ? preloaded.cloneNode() : document.createElement('link');
        link.id = styleId;
        link.rel = 'stylesheet';
        link.href = href;
        link.onload = function () {
          document.documentElement.setAttribute('data-route-style-ready', 'true');
        };
        document.head.appendChild(link);

        window.setTimeout(function () {
          document.documentElement.setAttribute('data-route-style-ready', 'true');
        }, 2500);
      })();
    </script>
  </head>
  <body>
    <div id="app-loader" aria-live="polite" aria-label="Loading application">
      <div class="loader-inner">
        <div class="loader-mark">CI</div>
        <div class="loader-text">Loading Citizen Intelligence Engine...</div>
        <div class="loader-spinner" aria-hidden="true"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
